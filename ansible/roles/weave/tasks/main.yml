---
- name: Ensure git config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/git"
    state: directory
    mode: '0755'

- name: Configure weave merge driver name
  ansible.builtin.git_config:
    name: merge.weave.name
    value: "Entity-level semantic merge"
    scope: global

- name: Configure weave merge driver command
  ansible.builtin.git_config:
    name: merge.weave.driver
    value: "weave-driver %O %A %B %L %P"
    scope: global

- name: Configure weave merge driver for file types
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.config/git/attributes"
    block: |
      *.ts merge=weave
      *.tsx merge=weave
      *.js merge=weave
      *.mjs merge=weave
      *.cjs merge=weave
      *.jsx merge=weave
      *.py merge=weave
      *.go merge=weave
      *.rs merge=weave
      *.java merge=weave
      *.c merge=weave
      *.h merge=weave
      *.cpp merge=weave
      *.cc merge=weave
      *.cxx merge=weave
      *.hpp merge=weave
      *.hh merge=weave
      *.hxx merge=weave
      *.rb merge=weave
      *.cs merge=weave
      *.php merge=weave
      *.f90 merge=weave
      *.f95 merge=weave
      *.f03 merge=weave
      *.f08 merge=weave
      *.json merge=weave
      *.yaml merge=weave
      *.yml merge=weave
      *.toml merge=weave
      *.md merge=weave
    marker: "# {mark} ANSIBLE MANAGED BLOCK - weave merge driver"
    create: true
    mode: '0644'
