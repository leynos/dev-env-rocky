---
- name: Ensure Cursor CLI bin directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    owner: "{{ owner_user }}"
    group: "{{ owner_user }}"
    mode: '0755'

- name: Install Cursor CLI
  ansible.builtin.shell:
    cmd: curl https://cursor.com/install -fsS | bash
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/agent"
  register: cursor_cli_install_result

- name: Debug Cursor CLI install output
  ansible.builtin.debug:
    msg: "{{ cursor_cli_install_result.stdout_lines | default([]) }}"
  when: cursor_cli_install_result is changed
