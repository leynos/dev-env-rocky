---
- name: Ensure sccache cache directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.cache/sccache"
    state: directory
    mode: '0755'

- name: Copy notdeadyet script to ~/.local/bin
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/git/agent-helper-scripts/notdeadyet"
    dest: "{{ ansible_env.HOME }}/.local/bin/notdeadyet"
    mode: '0755'
    remote_src: true

- name: Configure sccache environment in Codex config
  agentic.agent_configs.toml_file:
    path: "{{ ansible_env.HOME }}/.codex/config.toml"
    key: "env.{{ item.key }}"
    value: "{{ item.value }}"
    mode: '0644'
  loop:
    - key: RUSTC_WRAPPER
      value: "{{ ansible_env.HOME }}/.local/bin/notdeadyet"
    - key: RUSTC_HEARTBEAT_SECS
      value: "45"
    - key: SCCACHE_DIR
      value: "{{ ansible_env.HOME }}/.cache/sccache"
    - key: SCCACHE_CACHE_SIZE
      value: "120G"

- name: Remove obsolete Claude TOML config
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude/config.toml"
    state: absent

- name: Configure sccache environment in Claude settings
  agentic.agent_configs.json_file:
    path: "{{ ansible_env.HOME }}/.claude/settings.json"
    key: "env.{{ item.key }}"
    value: "{{ item.value }}"
    mode: '0644'
  loop:
    - key: RUSTC_WRAPPER
      value: "{{ ansible_env.HOME }}/.local/bin/notdeadyet"
    - key: RUSTC_HEARTBEAT_SECS
      value: "45"
    - key: SCCACHE_DIR
      value: "{{ ansible_env.HOME }}/.cache/sccache"
    - key: SCCACHE_CACHE_SIZE
      value: "120G"
