---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: coderabbit-cli-rocky10
    image: quay.io/rockylinux/rockylinux:10
    pre_build_image: true
    command: /usr/bin/sleep infinity

scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: /usr/bin/python3
      roles_path: ../..
    connection:
      pipelining: false
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible

lint: |
  set -e
  ANSIBLE_ROLES_PATH=../.. ansible-playbook --syntax-check molecule/rocky10/prepare.yml
  ANSIBLE_ROLES_PATH=../.. ansible-playbook --syntax-check molecule/rocky10/converge.yml
  ANSIBLE_ROLES_PATH=../.. ansible-playbook --syntax-check molecule/rocky10/verify.yml
