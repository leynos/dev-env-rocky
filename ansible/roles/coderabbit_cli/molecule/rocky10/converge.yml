---
- name: Converge coderabbit_cli
  hosts: all
  gather_facts: true

  vars:
    owner_user: root
    coderabbit_cli_installer_src: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/../../../../../coderabbit-install.sh"
    coderabbit_cli_download_url: file:///tmp/coderabbit-releases
    coderabbit_api_keys:
      coderabbit-cli-rocky10: molecule-coderabbit-token

  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
