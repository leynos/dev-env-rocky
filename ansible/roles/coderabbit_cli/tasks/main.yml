---
- name: Resolve owner user home directory
  ansible.builtin.getent:
    database: passwd
    key: "{{ owner_user }}"

- name: Set owner user home fact
  ansible.builtin.set_fact:
    owner_user_home: "{{ ansible_facts.getent_passwd[owner_user][4] }}"

- name: Ensure CodeRabbit CLI bin directory exists
  ansible.builtin.file:
    path: "{{ coderabbit_cli_install_dir }}"
    state: directory
    owner: "{{ owner_user }}"
    group: "{{ owner_user }}"
    mode: '0755'

- name: Ensure CodeRabbit CLI installer cache directory exists
  ansible.builtin.file:
    path: "{{ owner_user_home }}/.cache"
    state: directory
    owner: "{{ owner_user }}"
    group: "{{ owner_user }}"
    mode: '0755'

- name: Copy CodeRabbit CLI installer
  ansible.builtin.copy:
    src: "{{ coderabbit_cli_installer_src }}"
    dest: "{{ owner_user_home }}/.cache/coderabbit-install.sh"
    owner: "{{ owner_user }}"
    group: "{{ owner_user }}"
    mode: '0700'

- name: Install and validate CodeRabbit CLI
  block:
    - name: Install CodeRabbit CLI
      ansible.builtin.shell:
        cmd: "{{ owner_user_home }}/.cache/coderabbit-install.sh"
        executable: /bin/bash
      args:
        creates: "{{ coderabbit_cli_install_dir }}/coderabbit"
      environment:
        CODERABBIT_INSTALL_DIR: "{{ coderabbit_cli_install_dir }}"
        CODERABBIT_DOWNLOAD_URL: "{{ coderabbit_cli_download_url }}"
        NO_COLOR: "1"
      register: coderabbit_cli_install_result
      failed_when:
        - coderabbit_cli_install_result.rc != 0

    - name: Check CodeRabbit CLI binary after install
      ansible.builtin.stat:
        path: "{{ coderabbit_cli_install_dir }}/coderabbit"
      register: coderabbit_cli_binary

    - name: Check CodeRabbit CLI alias after install
      ansible.builtin.stat:
        path: "{{ coderabbit_cli_install_dir }}/cr"
      register: coderabbit_cli_alias

    - name: Assert CodeRabbit CLI install invariants
      ansible.builtin.assert:
        that:
          - coderabbit_cli_binary.stat.exists
          - coderabbit_cli_binary.stat.executable
          - coderabbit_cli_alias.stat.islnk
          - coderabbit_cli_alias.stat.lnk_source == coderabbit_cli_install_dir ~ '/coderabbit'
        fail_msg: >-
          CodeRabbit CLI install did not create the expected executable and
          alias under {{ coderabbit_cli_install_dir }}. stdout={{
          coderabbit_cli_install_result.stdout | default('') }} stderr={{
          coderabbit_cli_install_result.stderr | default('') }}
  rescue:
    - name: Report CodeRabbit CLI installer failure
      ansible.builtin.fail:
        msg: >-
          CodeRabbit CLI installation failed for {{ inventory_hostname }}.
          stdout={{ coderabbit_cli_install_result.stdout | default('') }}
          stderr={{ coderabbit_cli_install_result.stderr | default('') }}
          rc={{ coderabbit_cli_install_result.rc | default('not-run') }}

- name: Debug CodeRabbit CLI install output
  ansible.builtin.debug:
    msg: "{{ coderabbit_cli_install_result.stdout_lines | default([]) }}"
  when: coderabbit_cli_install_result is changed

- name: Authenticate CodeRabbit CLI with vaulted API key
  ansible.builtin.command:
    argv:
      - "{{ coderabbit_cli_install_dir }}/coderabbit"
      - auth
      - login
      - --api-key
      - "{{ coderabbit_cli_api_key }}"
  args:
    creates: "{{ owner_user_home }}/.coderabbit/auth.json"
  no_log: true
  when: coderabbit_cli_api_key | length > 0

- name: Restrict CodeRabbit CLI credential file permissions
  ansible.builtin.file:
    path: "{{ owner_user_home }}/.coderabbit/auth.json"
    owner: "{{ owner_user }}"
    group: "{{ owner_user }}"
    mode: '0600'
  when: coderabbit_cli_api_key | length > 0
