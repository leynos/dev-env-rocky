---
- name: Check if uv is installed
  ansible.builtin.command:
    cmd: which uv
  register: uv_check
  ignore_errors: true
  changed_when: false

- name: Install uv via official installer
  ansible.builtin.shell:
    cmd: curl -LsSf https://astral.sh/uv/install.sh | sh
  when: uv_check.rc != 0
  changed_when: true

- name: Install Python tools via uv
  uv_tool:
    name: "{{ item.name }}"
    spec: "{{ item.spec | default(omit) }}"
    with_packages: "{{ item.with_packages | default(omit) }}"
    with_executables_from: "{{ item.with_executables_from | default(omit) }}"
    uv_path: "{{ ansible_env.HOME }}/.local/bin/uv"
  loop:
    - {name: ruff}
    - {name: ansible, with_executables_from: ["ansible-core,ansible-lint"]}
    - {name: molecule, with_packages: ["molecule-plugins[podman]"]}
    - {name: ansible-lint}
    - {name: pyrefly}
    - {name: ty}
    - {name: yamllint}
    - {name: copier}
    - {name: mbake}
    - {name: basedpyright}
    - {name: repomix}
    - {name: python-slugify}
    - {name: git-donkey, spec: "git+https://github.com/leynos/git-donkey/"}
    - {name: nixie, spec: "git+https://github.com/leynos/nixie/"}
    - {name: lading, spec: "git+https://github.com/leynos/lading/"}
