---
# Clone and install agent skills from agent-helper-scripts

- name: Ensure git directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/git"
    state: directory
    mode: '0755'

- name: Clone agent-helper-scripts repository
  ansible.builtin.git:
    repo: https://github.com/leynos/agent-helper-scripts.git
    dest: "{{ ansible_env.HOME }}/git/agent-helper-scripts"
    version: HEAD
    depth: 1
    single_branch: true

- name: Ensure ~/.local/bin directory exists for helper executables
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    owner: "{{ owner_user }}"
    group: "{{ owner_user }}"
    mode: '0755'

- name: Install agent-helper-scripts helper executables
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/git/agent-helper-scripts/{{ item }}"
    dest: "{{ ansible_env.HOME }}/.local/bin/{{ item }}"
    mode: '0700'
    remote_src: true
  loop:
    - mdformat-all
    - notdeadyet

- name: Clone nextest-skill repository
  ansible.builtin.git:
    repo: https://github.com/leynos/nextest-skill.git
    dest: "{{ ansible_env.HOME }}/git/nextest-skill"
    version: HEAD
    depth: 1
    single_branch: true

- name: Clone vidai-mock-skill repository
  ansible.builtin.git:
    repo: https://github.com/leynos/vidai-mock-skill.git
    dest: "{{ ansible_env.HOME }}/git/vidai-mock-skill"
    version: HEAD
    depth: 1
    single_branch: true

- name: Clone rust-skill repository
  ansible.builtin.git:
    repo: https://github.com/leynos/rust-skill.git
    dest: "{{ ansible_env.HOME }}/git/rust-skill"
    version: HEAD
    depth: 1
    single_branch: true

- name: Check if SSH key exists for private repos
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.ssh/id_ed25519"
  register: ssh_key_stat

- name: Ensure SSH directory exists for private repo key
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh"
    state: directory
    mode: '0700'
  when:
    - not ansible_check_mode
    - not ssh_key_stat.stat.exists

- name: Generate SSH key for private repos
  ansible.builtin.command:
    argv:
      - ssh-keygen
      - -t
      - ed25519
      - -f
      - "{{ ansible_env.HOME }}/.ssh/id_ed25519"
      - -N
      - ""
      - -C
      - "{{ owner_user }}@{{ inventory_hostname }}"
    creates: "{{ ansible_env.HOME }}/.ssh/id_ed25519"
  when:
    - not ansible_check_mode
    - not ssh_key_stat.stat.exists

- name: Fetch private repo public key for GitHub access
  ansible.builtin.fetch:
    src: "{{ ansible_env.HOME }}/.ssh/id_ed25519.pub"
    dest: "{{ playbook_dir }}/../ssh-public-keys/{{ inventory_hostname }}-{{ owner_user }}-id_ed25519.pub"
    flat: true
  when:
    - not ansible_check_mode
    - not ssh_key_stat.stat.exists

- name: Stop until the private repo public key is added to GitHub
  ansible.builtin.fail:
    msg: >-
      Generated an SSH key for {{ owner_user }} on {{ inventory_hostname }} and
      fetched the public key to
      {{ playbook_dir }}/../ssh-public-keys/{{ inventory_hostname }}-{{ owner_user }}-id_ed25519.pub.
      Add that public key to GitHub, then rerun this playbook so private
      repositories can be cloned.
  when:
    - not ansible_check_mode
    - not ssh_key_stat.stat.exists

- name: Clone df12-readme-skill repository via SSH
  ansible.builtin.git:
    repo: git@github.com:leynos/df12-readme-skill.git
    dest: "{{ ansible_env.HOME }}/git/df12-readme-skill"
    version: HEAD
    depth: 1
    single_branch: true
    key_file: "{{ ansible_env.HOME }}/.ssh/id_ed25519"
    accept_hostkey: true
  when: ssh_key_stat.stat.exists

- name: Clone df12-documentation-skills repository via SSH
  ansible.builtin.git:
    repo: git@github.com:leynos/df12-documentation-skills.git
    dest: "{{ ansible_env.HOME }}/git/df12-documentation-skills"
    version: HEAD
    depth: 1
    single_branch: true
    key_file: "{{ ansible_env.HOME }}/.ssh/id_ed25519"
    accept_hostkey: true
  when: ssh_key_stat.stat.exists

- name: Check df12-documentation-skills skills directory
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/git/df12-documentation-skills/skills"
  register: df12_documentation_skills_dir
  when: ssh_key_stat.stat.exists

- name: Ensure Codex skills directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.codex/skills"
    state: directory
    mode: '0755'

- name: Ensure Claude skills directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude/skills"
    state: directory
    mode: '0755'

- name: Ensure Cursor skills directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.cursor/skills"
    state: directory
    mode: '0755'

- name: Check Cursor skills directory
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.cursor/skills"
  register: cursor_skills_directory

- name: Install Codex agent instructions
  ansible.builtin.copy:
    src: AGENTS.md
    dest: "{{ ansible_env.HOME }}/.codex/AGENTS.md"
    mode: '0644'

- name: Install Claude agent instructions
  ansible.builtin.copy:
    src: AGENTS.md
    dest: "{{ ansible_env.HOME }}/.claude/CLAUDE.md"
    mode: '0644'

- name: Find skills in agent-helper-scripts
  ansible.builtin.find:
    paths: "{{ ansible_env.HOME }}/git/agent-helper-scripts/skills"
    file_type: directory
    depth: 1
  register: agent_helper_skills

- name: Install agent-helper-scripts skills to Codex
  ansible.builtin.copy:
    src: "{{ item.path }}/"
    dest: "{{ ansible_env.HOME }}/.codex/skills/{{ item.path | basename }}"
    mode: 'preserve'
    remote_src: true
  loop: "{{ agent_helper_skills.files }}"

- name: Install agent-helper-scripts skills to Claude
  ansible.builtin.copy:
    src: "{{ item.path }}/"
    dest: "{{ ansible_env.HOME }}/.claude/skills/{{ item.path | basename }}"
    mode: 'preserve'
    remote_src: true
  loop: "{{ agent_helper_skills.files }}"

- name: Install agent-helper-scripts skills to Cursor
  ansible.builtin.copy:
    src: "{{ item.path }}/"
    dest: "{{ ansible_env.HOME }}/.cursor/skills/{{ item.path | basename }}"
    mode: 'preserve'
    remote_src: true
  loop: "{{ agent_helper_skills.files }}"
  when: not ansible_check_mode or (cursor_skills_directory.stat.isdir | default(false))
  register: agent_helper_scripts_cursor_install_result

- name: Debug agent-helper-scripts Cursor skill install
  ansible.builtin.debug:
    msg: "Installed {{ agent_helper_scripts_cursor_install_result.results | length }} files"
  when: agent_helper_scripts_cursor_install_result is changed

- name: Find skills in nextest-skill
