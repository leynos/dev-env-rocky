- name: Install rust-skill skills to Claude
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ ansible_env.HOME }}/.claude/skills/{{ item.path | basename }}"
    mode: 'preserve'
    remote_src: true
  loop: "{{ rust_skills.files }}"

- name: Find skills in df12-readme-skill
  ansible.builtin.find:
    paths: "{{ ansible_env.HOME }}/git/df12-readme-skill"
    file_type: directory
    depth: 1
  register: df12_readme_skills
  when: ssh_key_stat.stat.exists

- name: Install df12-readme-skill skills to Codex
  ansible.builtin.copy:
    src: "{{ item.path }}"
