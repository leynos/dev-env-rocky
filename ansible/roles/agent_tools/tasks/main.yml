# Install context_pack tool for agent communication
- name: Install context_pack tool
  ansible.builtin.shell:
    cmd: curl -fsSL https://raw.githubusercontent.com/AmirTlinov/context_pack/main/scripts/install.sh | bash
  args:
    creates: "{{ ansible_env.HOME }}/.local/bin/context_pack"

# Configure Codex with sub-agents using collection modules
- name: Ensure Codex directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.codex"
    state: directory
    mode: '0755'

- name: Ensure Codex agents directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.codex/agents"
    state: directory
    mode: '0755'

- name: Configure Codex CLI MCP servers
  agentic.agent_configs.codex_cli_mcp:
    name: "{{ item.name }}"
    state: "{{ item.state | default('present') }}"
    scope: user
    transport: "{{ item.transport }}"
    command: "{{ item.command | default(omit) }}"
    args: "{{ item.args | default(omit) }}"
    env: "{{ item.env | default(omit) }}"
  loop:
    - name: context_pack
      transport: stdio
      command: mcp-context-pack
      env:
        CONTEXT_PACK_ROOT: "{{ ansible_env.HOME }}/.local/state/context-pack"
        CONTEXT_PACK_SOURCE_ROOT: "__SESSION_CWD__"
        CONTEXT_PACK_LOG: "mcp_context_pack=info"
        CONTEXT_PACK_INITIALIZE_TIMEOUT_MS: "20000"
        CONTEXT_PACK_MAX_PACK_BYTES: "524288"
        CONTEXT_PACK_MAX_SOURCE_BYTES: "2097152"
        CONTEXT_PACK_EXPIRED_GRACE_SECONDS: "900"
    - name: playwright
      transport: stdio
      command: podman
      args:
        - run
        - --rm
        - -i
        - --network=host
        - -e
        - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
        - -e
        - PLAYWRIGHT_SKIP_BROWSER_GC=1
        - -e
        - PLAYWRIGHT_MCP_BROWSER=chromium
        - -v
        - "{{ ansible_env.HOME }}/.local/state/playwright/cache/ms-playwright:/ms-playwright:z"
        - -v
        - "{{ ansible_env.HOME }}/.local/state/playwright/cache/google-chrome:/opt/google/chrome:z"
        - -v
        - "{{ ansible_env.HOME }}/.local/state/playwright/cache/npm:/root/.npm:z"
        - -v
        - "{{ ansible_env.HOME }}/.local/state/playwright/work:/work:z"
        - -w
        - /work
        - mcr.microsoft.com/playwright:latest
        - bash
        - -lc
        - npx @playwright/mcp@latest --no-sandbox

- name: Configure Codex CLI Firecrawl MCP server
  agentic.agent_configs.codex_cli_mcp:
    name: firecrawl
    state: present
    scope: user
    transport: stdio
    command: firecrawl-mcp
    env:
      FIRECRAWL_API_KEY: "{{ firecrawl_api_key }}"
  no_log: true

- name: Configure Codex CLI subagents
  agentic.agent_configs.codex_cli_subagent:
    name: "{{ item.name }}"
    state: "{{ item.state | default('present') }}"
    scope: user
    description: "{{ item.description }}"
    model: "{{ item.model }}"
    model_reasoning_effort: "{{ item.reasoning_effort | default('medium') }}"
    sandbox_mode: "{{ item.sandbox_mode | default('workspace-write') }}"
    nickname_candidates: "{{ item.nickname_candidates | default(omit) }}"
    developer_instructions: "{{ item.developer_instructions }}"
  loop:
    - name: wyvern
      description: "Fast reconnaissance sub-agent for read-heavy exploration, file triage, and concise summaries. Use when speed matters more than deep reasoning or code edits."
      model: gpt-5.3-codex-spark
      reasoning_effort: medium
      sandbox_mode: read-only
      developer_instructions: |
        You are wyvern, a fast reconnaissance agent.

        Your responsibilities:
        - explore the codebase quickly
        - identify the relevant files, symbols, call paths, tests, and config
        - return concise, evidence-backed summaries
        - suggest likely next places to inspect

        Rules:
        - do not edit files
        - do not propose broad refactors
        - prefer targeted search and focused file reads over repo-wide wandering
        - cite exact file paths, symbols, and commands where possible
        - surface uncertainty explicitly instead of bluffing
        - return distilled findings, not raw stream-of-consciousness notes
    - name: scribe
      description: "Documentation-focused sub-agent for targeted changes to READMEs, ADRs, design docs, comments, and other prose-heavy project materials. Use when the task is primarily explanatory, editorial, or structural rather than behavioural."
      model: gpt-5.4-mini
      reasoning_effort: medium
      sandbox_mode: workspace-write
      developer_instructions: |
        You are scribe, a documentation editing agent.

        Your responsibilities:
        - make targeted documentation changes
        - improve clarity, structure, and technical accuracy
        - update README files, ADRs, design docs, developer guides, comments, and docstrings when asked
        - preserve project terminology, tone, and intent
        - keep diffs tight and easy to review

        Rules:
        - do not change runtime behaviour, APIs, tests, build config, or dependency manifests unless the task explicitly requires documentation-adjacent edits to keep docs accurate
        - prefer minimal, surgical edits over stylistic rewrites
        - do not invent features, commands, flags, or architectural intent
        - derive claims from the repository contents; if something is unclear, say so in your summary
        - keep examples internally consistent with the current codebase
        - call out any documentation gaps that could not be resolved from available evidence
        - when editing comments or docstrings, preserve code semantics and formatting conventions
        - return a concise summary of what changed, where, and any uncertainties

# Install Claude hooks
- name: Ensure Claude hooks directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude/hooks"
    state: directory
    mode: '0755'

- name: Copy post-turn-quality-stop-hook.py
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/git/agent-helper-scripts/hooks/post-turn-quality-stop-hook.py"
    dest: "{{ ansible_env.HOME }}/.claude/hooks/post-turn-quality-stop-hook.py"
    mode: '0755'
    remote_src: true

- name: Copy install-hook-cmd.sh to ~/.local/bin
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/git/agent-helper-scripts/bin/install-hook-cmd.sh"
    dest: "{{ ansible_env.HOME }}/.local/bin/install-hook-cmd"
    mode: '0755'
    remote_src: true

- name: Initialize Claude settings.json if not exists
  ansible.builtin.copy:
    content: "{}"
    dest: "{{ ansible_env.HOME }}/.claude/settings.json"
    mode: '0644'
    force: false

- name: Check if Stop hook is already installed
  ansible.builtin.shell:
    cmd: |
      jq -e '.hooks.Stop // [] | any(.hooks[]?; .type == "command" and (.command | contains("post-turn-quality-stop-hook.py")))' \
        "{{ ansible_env.HOME }}/.claude/settings.json" 2>/dev/null || true
  register: hook_installed
  changed_when: false

- name: Install Stop hook in Claude settings
  ansible.builtin.shell:
    cmd: |
      jq '.hooks.Stop = [{"hooks": [{"type": "command", "command": "python3 {{ ansible_env.HOME }}/.claude/hooks/post-turn-quality-stop-hook.py", "timeout": 600}]}]' \
        "{{ ansible_env.HOME }}/.claude/settings.json" > "{{ ansible_env.HOME }}/.claude/settings.json.tmp" && \
        mv "{{ ansible_env.HOME }}/.claude/settings.json.tmp" "{{ ansible_env.HOME }}/.claude/settings.json"
  when: hook_installed.stdout != "true"

# Install Codex hooks
- name: Check Codex hooks directory
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.codex/hooks"
  register: codex_hooks_directory

- name: Ensure Codex hooks directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.codex/hooks"
    state: directory
    mode: '0755'

- name: Copy post-turn-quality-stop-hook.py for Codex
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/git/agent-helper-scripts/hooks/post-turn-quality-stop-hook.py"
    dest: "{{ ansible_env.HOME }}/.codex/hooks/post-turn-quality-stop-hook.py"
    mode: '0755'
    remote_src: true
  when: not ansible_check_mode or (codex_hooks_directory.stat.isdir | default(false))

- name: Install Codex session-start hook wrapper
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.codex/hooks/session-start-hook.sh"
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      exec python3 "$HOME/.codex/hooks/post-turn-quality-stop-hook.py"
  when: not ansible_check_mode or (codex_hooks_directory.stat.isdir | default(false))

- name: Configure Codex Stop and SessionStart hooks
  agentic.agent_configs.codex_cli_hook:
    agent_executable: "{{ ansible_env.HOME }}/.local/bin/codex"
    state: present
    scope: user
    event: "{{ item.event }}"
    command: "{{ item.command }}"
    timeout: "{{ item.timeout }}"
    status_message: "{{ item.status_message | default(omit) }}"
  loop:
    - event: Stop
      command: "python3 {{ ansible_env.HOME }}/.codex/hooks/post-turn-quality-stop-hook.py"
      timeout: 600
      status_message: Running post-turn quality gate
    - event: SessionStart
      command: "{{ ansible_env.HOME }}/.codex/hooks/session-start-hook.sh"
      timeout: 30

# Configure Claude MCP servers using collection module
- name: Configure Claude Code MCP servers
  agentic.agent_configs.claude_code_mcp:
    name: "{{ item.name }}"
    state: "{{ item.state | default('present') }}"
    scope: user
    transport: "{{ item.transport }}"
    command: "{{ item.command | default(omit) }}"
    args: "{{ item.args | default(omit) }}"
    env: "{{ item.env | default(omit) }}"
  loop:
    - name: context_pack
      transport: stdio
      command: mcp-context-pack
      env:
        CONTEXT_PACK_ROOT: "{{ ansible_env.HOME }}/.local/state/context-pack"
        CONTEXT_PACK_SOURCE_ROOT: "__SESSION_CWD__"
        CONTEXT_PACK_LOG: "mcp_context_pack=info"
        CONTEXT_PACK_INITIALIZE_TIMEOUT_MS: "20000"
        CONTEXT_PACK_MAX_PACK_BYTES: "524288"
        CONTEXT_PACK_MAX_SOURCE_BYTES: "2097152"
        CONTEXT_PACK_EXPIRED_GRACE_SECONDS: "900"
    - name: playwright
      transport: stdio
      command: podman
      args:
        - run
        - --rm
        - -i
        - --network=host
        - -e
        - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
        - -e
        - PLAYWRIGHT_SKIP_BROWSER_GC=1
        - -e
        - PLAYWRIGHT_MCP_BROWSER=chromium
        - -v
        - "{{ ansible_env.HOME }}/.local/state/playwright/cache/ms-playwright:/ms-playwright:z"
        - -v
        - "{{ ansible_env.HOME }}/.local/state/playwright/cache/google-chrome:/opt/google/chrome:z"
        - -v
        - "{{ ansible_env.HOME }}/.local/state/playwright/cache/npm:/root/.npm:z"
        - -v
        - "{{ ansible_env.HOME }}/.local/state/playwright/work:/work:z"
        - -w
        - /work
        - mcr.microsoft.com/playwright:latest
        - bash
        - -lc
        - npx @playwright/mcp@latest --no-sandbox

