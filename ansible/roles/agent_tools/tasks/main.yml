---
# Clone and install agent skills from agent-helper-scripts

- name: Ensure git directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/git"
    state: directory
    mode: '0755'

- name: Clone agent-helper-scripts repository
  ansible.builtin.git:
    repo: https://github.com/leynos/agent-helper-scripts.git
    dest: "{{ ansible_env.HOME }}/git/agent-helper-scripts"
    version: HEAD
    depth: 1
    single_branch: true

- name: Clone nextest-skill repository
  ansible.builtin.git:
    repo: https://github.com/leynos/nextest-skill.git
    dest: "{{ ansible_env.HOME }}/git/nextest-skill"
    version: HEAD
    depth: 1
    single_branch: true

- name: Clone vidai-mock-skill repository
  ansible.builtin.git:
    repo: https://github.com/leynos/vidai-mock-skill.git
    dest: "{{ ansible_env.HOME }}/git/vidai-mock-skill"
    version: HEAD
    depth: 1
    single_branch: true

- name: Clone rust-skill repository
  ansible.builtin.git:
    repo: https://github.com/leynos/rust-skill.git
    dest: "{{ ansible_env.HOME }}/git/rust-skill"
    version: HEAD
    depth: 1
    single_branch: true

- name: Check if SSH key exists for private repos
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.ssh/id_ed25519"
  register: ssh_key_stat

- name: Clone df12-readme-skill repository via SSH
  ansible.builtin.git:
    repo: git@github.com:leynos/df12-readme-skill.git
    dest: "{{ ansible_env.HOME }}/git/df12-readme-skill"
    version: HEAD
    depth: 1
    single_branch: true
    key_file: "{{ ansible_env.HOME }}/.ssh/id_ed25519"
    accept_hostkey: true
  when: ssh_key_stat.stat.exists

- name: Ensure Codex skills directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.codex/skills"
    state: directory
    mode: '0755'

- name: Ensure Claude skills directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.claude/skills"
    state: directory
    mode: '0755'

- name: Find skills in agent-helper-scripts
  ansible.builtin.find:
    paths: "{{ ansible_env.HOME }}/git/agent-helper-scripts/skills"
    file_type: directory
    depth: 1
  register: agent_helper_skills

- name: Install agent-helper-scripts skills to Codex
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ ansible_env.HOME }}/.codex/skills/{{ item.path | basename }}"
    mode: 'preserve'
    remote_src: true
  loop: "{{ agent_helper_skills.files }}"

- name: Install agent-helper-scripts skills to Claude
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ ansible_env.HOME }}/.claude/skills/{{ item.path | basename }}"
    mode: 'preserve'
    remote_src: true
  loop: "{{ agent_helper_skills.files }}"

- name: Find skills in nextest-skill
  ansible.builtin.find:
    paths: "{{ ansible_env.HOME }}/git/nextest-skill"
    file_type: directory
    depth: 1
  register: nextest_skills

- name: Install nextest-skill skills to Codex
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ ansible_env.HOME }}/.codex/skills/{{ item.path | basename }}"
    mode: 'preserve'
    remote_src: true
