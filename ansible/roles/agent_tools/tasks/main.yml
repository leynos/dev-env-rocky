    src: "{{ item.path }}"
    dest: "{{ ansible_env.HOME }}/.claude/skills/{{ item.path | basename }}"
    mode: 'preserve'
    remote_src: true
  loop: "{{ nextest_skills.files }}"

- name: Find skills in vidai-mock-skill
  ansible.builtin.find:
    paths: "{{ ansible_env.HOME }}/git/vidai-mock-skill"
    file_type: directory
    depth: 1
  register: vidai_skills

- name: Install vidai-mock-skill skills to Codex
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ ansible_env.HOME }}/.codex/skills/{{ item.path | basename }}"
    mode: 'preserve'
    remote_src: true
  loop: "{{ vidai_skills.files }}"

- name: Install vidai-mock-skill skills to Claude
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ ansible_env.HOME }}/.claude/skills/{{ item.path | basename }}"
    mode: 'preserve'
    remote_src: true
  loop: "{{ vidai_skills.files }}"

- name: Find skills in rust-skill
  ansible.builtin.find:
    paths: "{{ ansible_env.HOME }}/git/rust-skill/skills"
    file_type: directory
    depth: 1
