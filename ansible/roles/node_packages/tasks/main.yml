---
- name: Check if bun is installed
  ansible.builtin.command:
    cmd: which bun
  register: bun_check
  ignore_errors: true
  changed_when: false

- name: Install bun via official installer
  ansible.builtin.shell:
    cmd: curl -fsSL https://bun.sh/install | bash
  when: bun_check.rc != 0
  changed_when: true

- name: Install Node packages globally via bun
  bun_global:
    name: "{{ item.name }}"
    bun_path: "{{ ansible_env.HOME }}/.bun/bin/bun"
    trust_postinstall: "{{ item.trust_postinstall | default(false) }}"
  loop:
    - name: "@biomejs/biome"
    - name: "markdownlint-cli2"
    - name: "@asyncapi/cli"
      trust_postinstall: true
      trust_postinstall_reason: "Runs CLI package setup during Bun global install."
    - name: "@redocly/cli"
    - name: "@mermaid-js/mermaid-cli"
    - name: "@anthropic-ai/claude-code"
      trust_postinstall: true
      trust_postinstall_reason: "Installs the Claude Code command wrapper."
    - name: "@openai/codex"
    - name: "firecrawl-mcp"
    - name: "@ataraxy-labs/sem"
      trust_postinstall: true
      trust_postinstall_reason: "Installs the sem command wrapper."
    - name: "droid"
      trust_postinstall: true
      trust_postinstall_reason: "Installs the Factory Droid command wrapper."
      enabled: "{{ (dev_env_enable_droid | default(false) | bool) and (dev_env_install_droid_cli | default(false) | bool) }}"
    - name: "puppeteer"
      trust_postinstall: true
      trust_postinstall_reason: "Installs browser automation assets."
      enabled: "{{ dev_env_install_puppeteer | default(false) | bool }}"
    - name: "acp-extension-codex-linux-x64"
      trust_postinstall: true
      trust_postinstall_reason: "Installs the Linux x86_64 Codex ACP extension."
      enabled: >-
        {{
          (dev_env_install_acp_extension_codex | default(false) | bool)
          and (ansible_facts['system'] == 'Linux')
          and (ansible_facts['architecture'] == 'x86_64')
        }}
    - name: "pnpm"
    - name: "typescript-language-server"
    - name: "@typescript/native-preview"
    - name: "lody"
      enabled: "{{ dev_env_enable_lody }}"
  when: item.enabled | default(true) | bool

- name: Ensure ~/.local/bin directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: '0755'

- name: Link firecrawl-mcp into ~/.local/bin
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.bun/bin/firecrawl-mcp"
    dest: "{{ ansible_env.HOME }}/.local/bin/firecrawl-mcp"
    state: link
    force: true

- name: Create tsgo symlink for tsc
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.local/bin/tsgo"
    dest: "{{ ansible_env.HOME }}/.local/bin/tsc"
    state: link
    force: true
