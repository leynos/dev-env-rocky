---
- name: Converge node_packages
  hosts: all
  gather_facts: true

  vars:
    dev_env_enable_lody: false
    dev_env_install_acp_extension_codex: false
    dev_env_install_droid_cli: false
    dev_env_install_puppeteer: false
    fake_bun_log_dir: /tmp/fake-bun-log

  environment:
    BUN_FAKE_LOG: "{{ fake_bun_log_dir }}/bun-commands.jsonl"

  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
