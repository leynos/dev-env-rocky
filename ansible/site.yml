---
- name: Configure development environment on servers
  hosts: servers
  become: true
  vars:
    systemd_user: leynos
  roles:
    - packages
    - infra_tools
    - user
    - user_linger

- name: Select hosts with an existing leynos user
  hosts: servers
  become: true
  gather_facts: false
  tasks:
    - name: Check whether leynos exists
      ansible.builtin.command:
        argv:
          - getent
          - passwd
          - leynos
      register: leynos_user
      check_mode: false
      changed_when: false
      failed_when: false

    - name: Add hosts with leynos to the user environment group
      ansible.builtin.group_by:
        key: user_environment_hosts
      when: leynos_user.rc == 0

- name: Configure user environment for leynos
  hosts: user_environment_hosts
  become: true
  become_user: leynos
  vars:
    ansible_ssh_private_key_file: "{{ hostvars[inventory_hostname]['ansible_ssh_private_key_file'] | default('~/.ssh/id_ed25519') }}"
  roles:
    - git
    - rustup
    - rust_crates
    - uv_tools
    - node_packages
    - go_packages
    - paths
    - agent_tools
    - sccache_user
    - rust_cleanup
    - weave
